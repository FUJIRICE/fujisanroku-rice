<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "ja" }}">
<head>
  {{- partial "head.html" . }}
</head>
<body class="{{ if .IsHome }}page-home{{ end }}">
  
  {{- if .IsHome }}
  <!-- Loader (only on home page) -->
  <div class="loader">
    <div class="loader-text">FUJI RICE</div>
  </div>
  {{- end }}
  
  {{- partial "header.html" . }}
  
  <main id="main-content">
    {{- block "main" . }}{{- end }}
  </main>
  
  {{- partial "footer.html" . }}
  
  <script src="/js/main.js" defer></script>
</body>
</html>
