<header class="site-header" id="site-header">
  <div class="header-inner">
    <a href="{{ "/" | relURL }}" class="site-logo">
      {{- with site.Params.logo }}
      <img src="{{ . }}" alt="{{ site.Title }}" width="40" height="40">
      {{- end }}
      <div class="logo-text">
        FUJI RICE
        <span class="logo-sub">富士山麓のお米</span>
      </div>
    </a>

    <nav class="main-nav" id="main-nav" aria-label="メインナビゲーション">
      {{- range site.Menus.main }}
        {{- if eq .Name "購入する" }}
        <a href="{{ .URL }}" class="nav-link nav-purchase" target="_blank" rel="noopener">
          🛒 {{ .Name }}
        </a>
        {{- else if eq .Name "LINEで相談" }}
        <a href="{{ .URL }}" class="nav-link" target="_blank" rel="noopener" style="color:#06C755;font-weight:700;">
          💬 {{ .Name }}
        </a>
        {{- else }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
          {{ .Name }}
        </a>
        {{- end }}
      {{- end }}
    </nav>

    <button class="nav-toggle" id="nav-toggle" aria-label="メニューを開く" aria-expanded="false" aria-controls="main-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
